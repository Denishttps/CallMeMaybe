[mypy]
python_version = 3.11
# Treat `src` as a library path so imports like `from generator import ...` resolve
mypy_path = src

[mypy-llm_sdk]
ignore_missing_imports = True

[mypy-packages]
# Suppress import-not-found for local packages while using src as source root
ignore_missing_imports = True
